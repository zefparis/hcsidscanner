# Codemagic CI/CD — Android APK + iOS IPA without owning a Mac.
#
# Both workflows assume the React Native app lives in `apps/demo-mobile`
# (to be added when the native shell is bootstrapped). For now they
# build the demo-web bundle and wrap it via Capacitor — adapt the paths
# if you migrate to a pure React Native host.
#
# Triggers:
#   - manual on push to main (set in Codemagic UI)
#
# Required env vars (Codemagic → App settings → Env variables):
#   - GOOGLE_PLAY_SERVICE_ACCOUNT_JSON  (Android signing & store upload)
#   - APP_STORE_CONNECT_PRIVATE_KEY      (iOS signing & TestFlight upload)
#   - APP_STORE_CONNECT_ISSUER_ID
#   - APP_STORE_CONNECT_KEY_IDENTIFIER
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  (Rekognition runtime)

workflows:
  android:
    name: Android — APK
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      node: 20.19.4
      java: 17
      vars:
        PACKAGE_NAME: "com.iasolution.hcsidscanner"
        BUILD_NUMBER: $(($CM_BUILD_NUMBER))
    scripts:
      - name: Install workspace dependencies
        script: |
          npm install --include=dev --legacy-peer-deps
      - name: Type-check the monorepo
        script: |
          npm run type-check
      - name: Build the demo-web bundle
        script: |
          npm run build:demo
      - name: Sync Capacitor (Android)
        script: |
          cd apps/demo-web
          # Bootstrap the Android shell on first run if absent.
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Build APK
        script: |
          cd apps/demo-web/android
          ./gradlew assembleRelease
    artifacts:
      - apps/demo-web/android/app/build/outputs/**/*.apk
      - apps/demo-web/android/app/build/outputs/**/*.aab

  ios:
    name: iOS — IPA (no local Mac required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20.19.4
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install workspace dependencies
        script: |
          npm install --include=dev --legacy-peer-deps
      - name: Build the demo-web bundle
        script: |
          npm run build:demo
      - name: Sync Capacitor (iOS)
        script: |
          cd apps/demo-web
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Archive
        script: |
          cd apps/demo-web/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -exportOptionsPlist apps/demo-web/ios/ExportOptions.plist
    artifacts:
      - build/ipa/*.ipa
