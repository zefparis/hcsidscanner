apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
  namespace "com.hcs.idscanner.nfc"
  compileSdk safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdk safeExtGet("minSdkVersion", 24)
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib"
  implementation "org.jmrtd:jmrtd:0.7.42"
  implementation "net.sf.scuba:scuba-smartcards:0.0.20"
}

// Helper to read ext properties from the host app's rootProject
def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}
